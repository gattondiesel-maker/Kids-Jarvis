<!DOCTYPE html>
<html>
<head>

<title>Jarvis Remote</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b0f14;
    color: #00ffd5;
    font-family: Arial, sans-serif;
}

#touchArea {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

#hint {
    margin-bottom: 20px;
    color: #7fffe8;
}

#state {
    font-size: 1.5em;
    margin-bottom: 20px;
}

#heard, #reply {
    margin-top: 10px;
    width: 85%;
    max-width: 700px;
    word-wrap: break-word;
}

</style>

</head>

<body>

<div id="touchArea">

<h1>JARVIS REMOTE</h1>

<div id="hint">
Hold to talk<br>
Tap to stop
</div>

<div id="state">
Listening...
</div>

<div id="heard">
Last heard: waiting...
</div>

<div id="reply">
Last reply: waiting...
</div>

<audio id="replyPlayer"></audio>

</div>

<script>

let pressTimer = null;
let isHolding = false;

let mediaRecorder = null;
let audioChunks = [];
let streamRef = null;

async function refreshStatus() {

    try {

        const response =
        await fetch('/status');

        const data =
        await response.json();

        document.getElementById('state').textContent =
        data.status || 'Listening...';

        document.getElementById('heard').textContent =
        'Last heard: ' +
        (data.last_heard || 'waiting...');

        document.getElementById('reply').textContent =
        'Last reply: ' +
        (data.last_reply || 'waiting...');

    }

    catch (e) {

        console.log('Status refresh failed');

    }

}

async function stopJarvis() {

    try {

        await fetch('/stop');

    }

    catch (e) {

        console.log('Stop failed');

    }

}

async function startRecording() {

    try {

        streamRef =
        await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        audioChunks = [];

        mediaRecorder =
        new MediaRecorder(streamRef);

        mediaRecorder.ondataavailable =
        (event) => {

            if (event.data.size > 0) {

                audioChunks.push(event.data);

            }

        };

        mediaRecorder.start();

    }

    catch (e) {

        console.log('Mic start failed', e);

        document.getElementById('state').textContent =
        'Mic permission denied';

    }

}

async function stopRecordingAndUpload() {

    if (!mediaRecorder) return;

    return new Promise((resolve) => {

        mediaRecorder.onstop =
        async () => {

            const audioBlob =
            new Blob(audioChunks,
            { type: 'audio/webm' });

            const formData =
            new FormData();

            formData.append(
                'audio',
                audioBlob,
                'remote.webm'
            );

            try {

                await fetch('/upload_audio', {
                    method: 'POST',
                    body: formData
                });

                document.getElementById('state').textContent =
                'Processing...';

                await waitForJarvisToFinish();

                await playLatestReply();

            }

            catch (e) {

                console.log('Upload failed', e);

                document.getElementById('state').textContent =
                'Upload failed';

            }

            if (streamRef) {

                streamRef.getTracks()
                .forEach(track => track.stop());

                streamRef = null;

            }

            mediaRecorder = null;

            resolve();

        };

        mediaRecorder.stop();

    });

}

async function waitForJarvisToFinish() {

    for (let i = 0; i < 60; i++) {

        try {

            const response =
            await fetch('/status');

            const data =
            await response.json();

            if (!data.is_busy) {
                return;
            }

        }

        catch (e) {

            console.log('Status poll failed');

        }

        await new Promise(resolve =>
            setTimeout(resolve, 500)
        );

    }

}

async function playLatestReply() {

    try {

        const player =
        document.getElementById('replyPlayer');

        player.src =
        '/reply_audio?t=' + Date.now();

        await player.play();

    }

    catch (e) {

        console.log('Playback failed', e);

    }

}

function startPress() {

    isHolding = false;

    pressTimer =
    setTimeout(async () => {

        isHolding = true;

        document.getElementById('state').textContent =
        'Recording...';

        await startRecording();

    }, 300);

}

async function endPress() {

    clearTimeout(pressTimer);

    if (!isHolding) {

        stopJarvis();

    }

    else {

        isHolding = false;

        document.getElementById('state').textContent =
        'Uploading...';

        await stopRecordingAndUpload();

    }

}

const touchArea =
document.getElementById('touchArea');

touchArea.addEventListener(
'touchstart',
(e) => {
    e.preventDefault();
    startPress();
},
{ passive: false }
);

touchArea.addEventListener(
'touchend',
(e) => {
    e.preventDefault();
    endPress();
},
{ passive: false }
);

touchArea.addEventListener(
'mousedown',
startPress
);

touchArea.addEventListener(
'mouseup',
endPress
);

touchArea.addEventListener(
'mouseleave',
() => {
    clearTimeout(pressTimer);
}
);

setInterval(refreshStatus, 500);

refreshStatus();

</script>

</body>
</html>
